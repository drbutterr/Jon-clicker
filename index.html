<!DOCTYPE html>
<html>
<head>
<title>Jon Clicker Deluxe</title>

<style>
body{
font-family:Arial;
background:url("jon2.jpg");
background-size:cover;
background-attachment:fixed;
color:white;
text-align:center;
overflow-x:hidden
}

#jon{
width:350px;
cursor:pointer;
transition:transform .1s
}

#jon:active{
transform:scale(.9)
}

.shop{
display:flex;
justify-content:center;
gap:50px;
margin-top:20px;
flex-wrap:wrap
}

.panel{
background:#1e1e1ee0;
padding:15px;
border-radius:10px;
width:300px
}

button{
padding:6px;
margin:5px;
cursor:pointer
}

.item{
display:flex;
align-items:center;
justify-content:space-between;
margin:6px;
font-size:14px
}

.rainJon{
position:fixed;
top:-60px;
width:50px;
pointer-events:none;
animation:fall linear forwards
}

@keyframes fall{
to{transform:translateY(110vh) rotate(360deg)}
}
</style>
</head>

<body>

<h1>Jon Clicker Deluxe</h1>

<h2>Jon Points: <span id="points">0</span></h2>
<h3>Per Click: <span id="perClick">1</span></h3>
<h3>Per Second: <span id="perSecond">0</span></h3>
<h3>Click Multiplier: <span id="clickMulti">1x</span></h3>

<h3>Jon Souls: <span id="souls">0</span></h3>
<button id="rebirthBtn" onclick="rebirth()">Rebirth (1,000,000 points)</button>
<button onclick="startRain()">Summon Jon Rain</button>
<button onclick="exportSave()">Download Save</button>
<input type="file" id="importFile" style="display:none" onchange="importSave(this.files)">
<button onclick="document.getElementById('importFile').click()">Upload Save</button>

<br><br>

<img id="jon" src="jon.jpg">

<div class="shop">

<div class="panel" id="upgradePanel" style="display:none">
<h3>Jon Upgrades</h3>
<div id="upgradeShop"></div>
</div>

<div class="panel" id="autoPanel" style="display:none">
<h3>Auto Jon Machines</h3>
<div id="autoShop"></div>
</div>

<div class="panel" id="soulPanel" style="display:none">
<h3>Soul Upgrades (Permanent)</h3>
<div id="soulShop"></div>
</div>

</div>
  
<script>

let points=0, perClick=1, perSecond=0, souls=0, soulBoost=1, rebirthCost=1000000
const img=document.getElementById("jon")

function formatNumber(num){

if(num >= 1e12) return (num/1e12).toFixed(2)+"T"
if(num >= 1e9) return (num/1e9).toFixed(2)+"B"
if(num >= 1e6) return (num/1e6).toFixed(2)+"M"
if(num >= 1e3) return (num/1e3).toFixed(2)+"K"

return Math.floor(num)
}

const upgrades=[
{name:"Energy Drink Jon",cost:10,baseCost:10,power:1,count:0},
{name:"Gaming Chair Jon",cost:50,baseCost:50,power:5,count:0},
{name:"Big Brain Jon",cost:200,baseCost:200,power:15,count:0},
{name:"Ultra Instinct Jon",cost:800,baseCost:800,power:40,count:0},
{name:"God Gamer Jon",cost:3000,baseCost:3000,power:100,count:0}
]

const autos=[
{name:"Mini Jon Clone",cost:25,baseCost:25,power:1,count:0},
{name:"Jon Farm",cost:120,baseCost:120,power:3,count:0},
{name:"Jon Factory",cost:500,baseCost:500,power:8,count:0},
{name:"Jon AI",cost:2000,baseCost:2000,power:20,count:0},
{name:"Jon Dimension Portal",cost:7000,baseCost:7000,power:60,count:0}
]

const soulUpgrades=[
{name:"Stronger Clicks",cost:5,power:1,count:0,type:"click"},
{name:"Faster Autos",cost:5,power:1,count:0,type:"auto"},
{name:"Mega Multiplier",cost:10,power:0.25,count:0,type:"boost"},
{name:"Soul Auto-Click",cost:15,power:2,count:0,type:"auto"},
{name:"Golden Jon",cost:25,power:1,count:0,type:"gold"}
]

img.onclick=clickJon

function clickJon(){
points+=perClick*soulBoost
update()
}

document.addEventListener("keydown",function(e){
if(e.code==="Space"){
e.preventDefault()
clickJon()
}
})

function update(){

points=Math.floor(points)

document.getElementById("points").innerText=formatNumber(points)
document.getElementById("perClick").innerText=formatNumber(perClick)
document.getElementById("perSecond").innerText=formatNumber(perSecond)
document.getElementById("souls").innerText=souls
document.getElementById("clickMulti").innerText=soulBoost.toFixed(2)+"x"

document.getElementById("rebirthBtn").innerText=`Rebirth (${formatNumber(rebirthCost)} points)`

if(points>=10) document.getElementById("upgradePanel").style.display="block"
if(points>=25) document.getElementById("autoPanel").style.display="block"
if(souls>0) document.getElementById("soulPanel").style.display="block"

saveGame()
}

function renderShops(){

let uhtml="",ahtml="",shtml=""

upgrades.forEach((u,i)=>{
uhtml+=`<div class="item"><span>${u.name} (${u.count})</span><button onclick="buyUpgrade(${i})">${formatNumber(u.cost)}</button></div>`
})

autos.forEach((a,i)=>{
ahtml+=`<div class="item"><span>${a.name} (${a.count})</span><button onclick="buyAuto(${i})">${formatNumber(a.cost)}</button></div>`
})

soulUpgrades.forEach((s,i)=>{
shtml+=`<div class="item"><span>${s.name} (${s.count})</span><button onclick="buySoulUpgrade(${i})">${s.cost} Souls</button></div>`
})

document.getElementById("upgradeShop").innerHTML=uhtml
document.getElementById("autoShop").innerHTML=ahtml
document.getElementById("soulShop").innerHTML=shtml
}

function buyUpgrade(i){
let u=upgrades[i]
if(points>=u.cost){
points-=u.cost
u.count++
perClick+=u.power
u.cost=Math.floor(u.cost*1.2)
renderShops()
update()
}}

function buyAuto(i){
let a=autos[i]
if(points>=a.cost){
points-=a.cost
a.count++
perSecond+=a.power
a.cost=Math.floor(a.cost*1.35)
renderShops()
update()
}}

function buySoulUpgrade(i){
let s=soulUpgrades[i]
if(souls>=s.cost){
souls-=s.cost
s.count++

if(s.type=="click") perClick+=s.power
if(s.type=="auto") perSecond+=s.power
if(s.type=="boost") soulBoost+=s.power
if(s.type=="gold") perClick*=2

s.cost=Math.floor(s.cost*1.7)

renderShops()
update()
}}

setInterval(()=>{
points+=perSecond*soulBoost
update()
},1000)

function rebirth(){

if(points>=rebirthCost){

souls+=10

soulBoost=1

soulUpgrades.forEach(s=>{
if(s.type=="boost"){
soulBoost+=s.count*s.power
}
})

soulBoost+=souls*0.1

points=0
perClick=1
perSecond=0

rebirthCost=Math.floor(rebirthCost*1.5)

upgrades.forEach(u=>{u.count=0;u.cost=u.baseCost})
autos.forEach(a=>{a.count=0;a.cost=a.baseCost})

renderShops()
update()

alert(`Rebirth complete! Souls: ${souls}`)
}}

function startRain(){

for(let i=0;i<25;i++){

let j=document.createElement("img")

j.src="jon.jpg"
j.className="rainJon"

j.style.left=Math.random()*100+"vw"
j.style.animationDuration=(3+Math.random()*3)+"s"

document.body.appendChild(j)

setTimeout(()=>{j.remove()},6000)
}}

function saveGame(){

localStorage.setItem("jonClickerSave",JSON.stringify({
points,perClick,perSecond,souls,soulBoost,rebirthCost,upgrades,autos,soulUpgrades
}))
}

function loadSave(){

const saved=localStorage.getItem("jonClickerSave")

if(saved){

const d=JSON.parse(saved)

points=d.points
perClick=d.perClick
perSecond=d.perSecond
souls=d.souls
soulBoost=d.soulBoost
rebirthCost=d.rebirthCost||1000000

upgrades.forEach((u,i)=>Object.assign(u,d.upgrades[i]))
autos.forEach((a,i)=>Object.assign(a,d.autos[i]))
soulUpgrades.forEach((s,i)=>Object.assign(s,d.soulUpgrades[i]))

renderShops()
update()
}
}

function exportSave(){

const blob=new Blob([JSON.stringify({
points,perClick,perSecond,souls,soulBoost,rebirthCost,upgrades,autos,soulUpgrades
})],{type:"application/json"})

const url=URL.createObjectURL(blob)

const a=document.createElement("a")
a.href=url
a.download="jonClickerSave.json"
a.click()

URL.revokeObjectURL(url)
}

function importSave(files){

if(files.length===0) return

const reader=new FileReader()

reader.onload=e=>{

try{

const d=JSON.parse(e.target.result)

points=d.points
perClick=d.perClick
perSecond=d.perSecond
souls=d.souls
soulBoost=d.soulBoost
rebirthCost=d.rebirthCost

upgrades.forEach((u,i)=>Object.assign(u,d.upgrades[i]))
autos.forEach((a,i)=>Object.assign(a,d.autos[i]))
soulUpgrades.forEach((s,i)=>Object.assign(s,d.soulUpgrades[i]))

renderShops()
update()

alert("Save Imported!")

}catch{
alert("Invalid save file")
}}

reader.readAsText(files[0])
}

loadSave()
renderShops()
update()

</script>

</body>
</html>
