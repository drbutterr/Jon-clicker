<!DOCTYPE html>
<html>
<head>
<title>Jon Clicker Deluxe</title>

<style>
:root{
--panel:rgba(20,20,20,0.85);
}
body{
font-family:"Segoe UI",Arial,sans-serif;
background:url("jon2.jpg");
background-size:cover;
background-attachment:fixed;
color:white;
text-align:center;
overflow-x:hidden;
}
body::before{
content:"";
position:fixed;
inset:0;
background:linear-gradient(180deg,rgba(0,0,0,0.55),rgba(0,0,0,0.85));
pointer-events:none;
}
#jon{
width:360px;
cursor:pointer;
transition:transform .08s ease,filter .35s ease;
filter:drop-shadow(0 0 18px rgba(255,255,255,0.65));
animation:heroFloat 6s ease-in-out infinite;
}
#jon.pressed{
  transform:translateY(4px) scale(.92);
  filter:drop-shadow(0 0 6px rgba(255,255,255,0.25));
}
.shop{
display:flex;
justify-content:center;
gap:40px;
margin-top:25px;
flex-wrap:wrap;
padding-bottom:20px;
}
.panel{
background:var(--panel);
padding:20px;
border-radius:14px;
width:320px;
border:1px solid rgba(255,255,255,0.12);
box-shadow:0 20px 60px rgba(0,0,0,0.8);
backdrop-filter:blur(12px);
transition:transform .3s ease,box-shadow .3s ease;
}
.panel:hover{
transform:translateY(-6px);
box-shadow:0 30px 60px rgba(0,0,0,0.9),0 0 25px rgba(255,255,255,0.15);
}
button{
padding:10px 14px;
margin:6px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,rgba(255,255,255,0.18),rgba(255,255,255,0.05));
color:white;
letter-spacing:0.5px;
cursor:pointer;
transition:transform .2s ease,box-shadow .2s ease;
}
button:hover{
transform:translateY(-3px);
box-shadow:0 12px 24px rgba(0,0,0,0.35),0 0 30px rgba(255,255,255,0.2);
}
.item{
display:flex;
align-items:center;
justify-content:space-between;
margin:8px 0;
font-size:15px;
}

.item-text{
display:flex;
flex-direction:column;
align-items:flex-start;
gap:2px;
max-width:calc(100% - 110px);
line-height:1.2;
}

.item .desc{
font-size:12px;
color:rgba(255,255,255,0.75);
opacity:0;
max-height:0;
overflow:hidden;
transition:opacity .3s,max-height .3s;
}

.item:hover .desc{
opacity:1;
max-height:48px;
}
.bulk-grid{
display:flex;
gap:6px;
margin-top:8px;
flex-wrap:wrap;
}
.bulk-grid button{
flex:1;
font-size:12px;
padding:6px 10px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.3);
background:linear-gradient(145deg,rgba(255,255,255,0.2),rgba(0,0,0,0.3));
box-shadow:0 10px 20px rgba(0,0,0,0.35),0 0 10px rgba(255,255,255,0.08);
color:white;
cursor:pointer;
transition:transform .2s ease,box-shadow .2s ease;
}
.bulk-grid button:hover{
transform:translateY(-2px);
box-shadow:0 18px 30px rgba(0,0,0,0.45);
}
.stats-grid{
margin:20px auto;
max-width:960px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:16px;
padding:0 10px;
}
.stat-card{
background:linear-gradient(135deg,rgba(255,255,255,0.2),rgba(0,0,0,0.35));
border:1px solid rgba(255,255,255,0.3);
border-radius:18px;
padding:16px 18px;
text-align:left;
box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 20px rgba(255,255,255,0.08);
backdrop-filter:blur(16px);
transition:transform .3s ease,box-shadow .3s ease;
position:relative;
}
.stat-card:hover{
transform:translateY(-6px);
box-shadow:0 30px 70px rgba(0,0,0,0.7),0 0 25px rgba(255,255,255,0.2);
}
.stat-card--points{
grid-column:span 2;
}
.stat-card--points .point-gain{
right:22px;
}
.stat-card--points::after{
content:"";
position:absolute;
inset:12px;
border:1px solid rgba(255,255,255,0.08);
border-radius:14px;
pointer-events:none;
opacity:0.7;
}
.point-gain{
position:fixed;
top:120px;
right:2rem;
padding:6px 10px;
font-size:0.95rem;
letter-spacing:.6px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.35);
background:rgba(0,0,0,0.55);
opacity:0;
transform:translateY(-6px) scale(0.95);
transition:opacity .25s ease,transform .25s ease,color .2s ease,background .2s ease;
pointer-events:none;
z-index:25;
}
.point-gain.visible{
opacity:1;
transform:translateY(-24px) scale(1);
}
.stat-label{
display:block;
font-size:11px;
letter-spacing:1.8px;
text-transform:uppercase;
color:rgba(255,255,255,0.75);
margin-bottom:6px;
}
.stat-value{
display:block;
font-family:"Segoe UI Semibold",sans-serif;
font-size:1.6rem;
font-weight:600;
letter-spacing:.5px;
text-shadow:0 0 14px rgba(255,255,255,0.6);
}
.stat-value--large{
font-size:2.6rem;
}
@media (max-width:640px){
.stat-card--points{
grid-column:span 1;
}
}
.rainJon{
position:fixed;
top:-60px;
width:45px;
pointer-events:none;
animation:fall linear forwards;
filter:drop-shadow(0 0 8px rgba(0,0,0,0.6));
}
.floatJon{
position:fixed;
width:55px;
z-index:2;
animation:floatUp 1.4s ease-out forwards;
filter:drop-shadow(0 0 20px rgba(255,255,255,0.55));
pointer-events:auto;
cursor:pointer;
}
@keyframes fall{
to{transform:translateY(110vh) rotate(360deg)}
}
@keyframes floatUp{
0%{opacity:0;transform:translateY(15px) scale(0.9);}
40%{opacity:1;}
100%{opacity:0;transform:translateY(-40px) scale(1.05);}
}
@keyframes heroFloat{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}
h1,h2,h3{
text-shadow:0 0 24px rgba(0,0,0,0.6);
letter-spacing:1px;
transition:letter-spacing .4s ease;
}
h1:hover{
letter-spacing:2px;
}
</style>
</head>
<body>
<h1 id="titleLabel">Jon Clicker Deluxe</h1>
<div class="stats-grid">
  <div class="stat-card stat-card--points">
    <span class="stat-label" id="pointsLabel">Jon Points</span>
    <span class="stat-value stat-value--large" id="points">0</span>
    <span class="point-gain" id="pointGain" aria-hidden="true">+0</span>
  </div>
  <div class="stat-card">
    <span class="stat-label">Per Click</span>
    <span class="stat-value" id="perClick">1</span>
  </div>
  <div class="stat-card">
    <span class="stat-label">Per Second</span>
    <span class="stat-value" id="perSecond">0</span>
  </div>
  <div class="stat-card">
    <span class="stat-label">Click Multiplier</span>
    <span class="stat-value" id="clickMulti">1x</span>
  </div>
  <div class="stat-card">
    <span class="stat-label">Auto Multiplier</span>
    <span class="stat-value" id="autoMulti">1x</span>
  </div>
  <div class="stat-card">
    <span class="stat-label">Rebirths</span>
    <span class="stat-value" id="rebirthCount">0</span>
  </div>
  <div class="stat-card">
    <span class="stat-label">Superjon Rebirths</span>
    <span class="stat-value" id="superRebirthCount">0</span>
  </div>
  <div class="stat-card">
    <span class="stat-label" id="soulsLabel">Jon Souls</span>
    <span class="stat-value" id="souls">0</span>
  </div>
</div>
<button id="rebirthBtn" onclick="rebirth()">Rebirth (1,000,000 points)</button>
<button id="rainBtn" onclick="toggleRain()">Activate Jon Rain</button>
<button onclick="exportSave()">Download Save</button>
<input type="file" id="importFile" style="display:none" onchange="importSave(this.files)">
<button onclick="document.getElementById('importFile').click()">Upload Save</button>
<br><br>
<img id="jon" src="jon.jpg">
<div class="shop">
<div class="panel" id="upgradePanel" style="display:none">
<h3 id="upgradeHeader">Jon Upgrades</h3>
<div id="upgradeShop"></div>
</div>
<div class="panel" id="autoPanel" style="display:none">
<h3 id="autoHeader">Auto Jon Machines</h3>
<div id="autoShop"></div>
</div>
<div class="panel" id="soulPanel" style="display:none">
<h3>Soul Upgrades (Permanent)</h3>
<div id="soulShop"></div>
</div>
</div>
<script>
const baseRebirthCost=1000000
let superRebirthThreshold=1e9
const superRebirthCostIncrease=1e9
const superRebirthSoulReward=50
let points=0, perClick=1, perSecond=0, souls=0, rebirthCost=baseRebirthCost
let clickMultiplier=1, autoMultiplier=1
let rebirthCount=0
let superRebirthCount=0
let heroImage="jon.jpg"
const forrestHeroImage="IMG_0228-removebg-preview.png"
const forrestBackground="IMG_0197.jpg"
let forrestMode=false
const secretWord="forrest"
let secretBuffer=""
const jonKeys={j:false,o:false,n:false}
const themeTextTargets=[
  {id:"titleLabel", jon:"Jon Clicker Deluxe", forrest:"Forrest Clicker Deluxe"},
  {id:"pointsLabel", jon:"Jon Points", forrest:"Forrest Points"},
  {id:"soulsLabel", jon:"Jon Souls", forrest:"Forrest Souls"},
  {id:"upgradeHeader", jon:"Jon Upgrades", forrest:"Forrest Upgrades"},
  {id:"autoHeader", jon:"Auto Jon Machines", forrest:"Auto Forrest Machines"}
]
const jonRegex=/Jon/g
const img=document.getElementById("jon")
img.src=heroImage
const rainBtn=document.getElementById("rainBtn")
let rainTimeoutId=null
let isRainActive=false
function pressHero(){
  img.classList.add("pressed")
}
function releaseHero(){
  img.classList.remove("pressed")
}
img.addEventListener("mousedown",pressHero)
img.addEventListener("pointerdown",pressHero)
img.addEventListener("touchstart",pressHero)
img.addEventListener("mouseup",releaseHero)
img.addEventListener("pointerup",releaseHero)
img.addEventListener("touchend",releaseHero)
img.addEventListener("mouseleave",releaseHero)
img.addEventListener("touchcancel",releaseHero)

function themedText(text){
  return forrestMode ? text.replace(jonRegex,"Forrest") : text
}

function formatDelta(value){
  const decimals = value % 1 === 0 ? 0 : 2
  return Number(value.toFixed(decimals)).toString()
}

function upgradeTooltip(u){
  return `${themedText(u.description)} +${formatDelta(u.power)} per click.`
}

function autoTooltip(a){
  return `${themedText(a.description)} +${formatDelta(a.power)} per second.`
}

let pointGainTimeout=null
const gainColors=[
"#6df2ff",
"#ffce6d",
"#ff8b6b",
"#8a9cff",
"#70ff8a"
]

function showPointGain(amount){
  const gainEl=document.getElementById("pointGain")
  if(!gainEl) return
  const color=gainColors[Math.floor(Math.random()*gainColors.length)]
  gainEl.innerText=`+${formatInteger(amount)}`
  gainEl.style.color=color
  const [r,g,b]=hexToRgb(color)
  gainEl.style.background=`rgba(${r},${g},${b},0.15)`
  gainEl.style.borderColor=color
  gainEl.classList.add("visible")
  clearTimeout(pointGainTimeout)
  pointGainTimeout=setTimeout(()=>gainEl.classList.remove("visible"),550)
}

function getRainLabel(){
  const prefix=isRainActive?"Deactivate":"Activate"
  const name=forrestMode?"Forrest":"Jon"
  return `${prefix} ${name} Rain`
}

function updateRainButton(){
  if(!rainBtn) return
  rainBtn.innerText=getRainLabel()
}
const defaultUpgrades=[
  {name:"Energy Drink Jon",cost:10,baseCost:10,power:1,count:0,description:"Fizzed-up reflexes add one steady click."},
  {name:"Gaming Chair Jon",cost:50,baseCost:50,power:5,count:0,description:"Ergonomic posture unlocks five extra clicks."},
  {name:"Big Brain Jon",cost:200,baseCost:200,power:15,count:0,description:"Sharp reasoning turns each tap into fifteen points."},
  {name:"Ultra Instinct Jon",cost:800,baseCost:800,power:40,count:0,description:"Instinctive response boosts every hit by forty."},
  {name:"God Gamer Jon",cost:3000,baseCost:3000,power:100,count:0,description:"Cosmic focus gives you a hundred-point punch."}
]
let upgrades=defaultUpgrades.map(u=>({...u}))
const defaultAutos=[
  {name:"Mini Jon Clone",cost:25,baseCost:25,power:1,count:0,description:"Clones tap once per second while you rest."},
  {name:"Jon Farm",cost:120,baseCost:120,power:3,count:0,description:"A farm of Jon clones produces three steady clicks."},
  {name:"Jon Factory",cost:500,baseCost:500,power:8,count:0,description:"Full factory output pumps eight clicks per second."},
  {name:"Jon AI",cost:2000,baseCost:2000,power:20,count:0,description:"AI-driven Jon adds twenty taps without your hand."},
  {name:"Jon Dimension Portal",cost:7000,baseCost:7000,power:60,count:0,description:"Portals beam sixty clicks from another realm."}
]
let autos=defaultAutos.map(a=>({...a}))
const defaultSoulUpgrades=[
  {name:"Kyle's Questionable Boost",cost:5,baseCost:5,clickBonus:1.5,autoBonus:0,count:0,description:"Adds +1.50 to the click multiplier."},
  {name:"Gavin's Jazz-Hand Multiplier",cost:12,baseCost:12,clickBonus:2.5,autoBonus:1.0,count:0,description:"Adds +2.50 to the click multiplier and +1.00 to the auto multiplier."},
  {name:"Silas's Nap-Time Surge",cost:22,baseCost:22,clickBonus:1.8,autoBonus:2.5,count:0,description:"Adds +1.80 to the click multiplier and +2.50 to the auto multiplier."},
  {name:"Cayden's Coffee-Fueled Multiplier",cost:46,baseCost:46,clickBonus:3.1,autoBonus:2.2,count:0,description:"Adds +3.10 to the click multiplier and +2.20 to the auto multiplier."},
  {name:"Jon's Legendary Self-Approval",cost:90,baseCost:90,clickBonus:4.0,autoBonus:3.3,count:0,description:"Adds +4.00 to the click multiplier and +3.30 to the auto multiplier."},
  {name:"Chris's Spreadsheet Chant",cost:150,baseCost:150,clickBonus:0.0,autoBonus:5.0,count:0,description:"Adds +5.00 to the auto multiplier while leaving clicks unchanged."},
  {name:"Zalichi's Nebula High-Five",cost:320,baseCost:320,clickBonus:6.5,autoBonus:4.2,count:0,description:"Adds +6.50 to the click multiplier and +4.20 to the auto multiplier."}
]
let soulUpgrades=defaultSoulUpgrades.map(s=>({...s}))

function restoreItemsWithSavedState(target, defaults, saved){
  target.forEach((item,index)=>{
    Object.assign(item, defaults[index] || {})
    const stored=saved?.[index]
    if(stored){
      if(typeof stored.count==="number") item.count=stored.count
      if(typeof stored.cost==="number") item.cost=stored.cost
    }
  })
}

function resetItems(target, defaults){
  target.forEach((item,index)=>{
    Object.assign(item, defaults[index] || {})
    item.count=0
    item.cost=item.baseCost
  })
}

function estimateRebirthCountFromSoulsData(data){
  if(!data?.soulUpgrades) return 0
  let spent=0
  data.soulUpgrades.forEach((entry, index)=>{
    const base=entry?.baseCost ?? defaultSoulUpgrades[index]?.baseCost ?? entry?.cost ?? 0
    const count=Math.max(0, entry?.count ?? 0)
    for(let k=0;k<count;k++){
      spent+=Math.floor(base*Math.pow(1.7,k))
    }
  })
  const totalSouls=(data?.souls ?? 0)+spent
  return Math.floor(totalSouls/10)
}
function applyForrestTheme(){
if(forrestMode) return
forrestMode=true
themeTextTargets.forEach(item=>{
const el=document.getElementById(item.id)
if(el) el.innerText=item.forrest
})
heroImage=forrestHeroImage
img.src=heroImage
document.body.style.backgroundImage=`url("${forrestBackground}")`
  renderShops()
  updateRainButton()
}
function themedName(name){
return forrestMode ? name.replace(jonRegex,"Forrest") : name
}
function handleSecretInput(key){
if(!/^[a-z]$/.test(key)) return
secretBuffer=(secretBuffer+key).slice(-secretWord.length)
if(secretBuffer===secretWord){
applyForrestTheme()
}
}
function formatNumber(num){
if(num >= 1e12) return (num/1e12).toFixed(2)+"T"
if(num >= 1e9) return (num/1e9).toFixed(2)+"B"
if(num >= 1e6) return (num/1e6).toFixed(2)+"M"
if(num >= 1e3) return (num/1e3).toFixed(2)+"K"
return Math.floor(num)
}
function formatInteger(num){
  return Math.floor(num).toLocaleString("en-US")
}
function hexToRgb(hex){
  const value=hex.replace("#","")
  return [
    parseInt(value.slice(0,2),16),
    parseInt(value.slice(2,4),16),
    parseInt(value.slice(4,6),16)
  ]
}
function rebuildMultipliers(){
clickMultiplier=1+souls*0.02
autoMultiplier=1+souls*0.03
soulUpgrades.forEach(s=>{
clickMultiplier+=s.count*s.clickBonus
autoMultiplier+=s.count*s.autoBonus
})
}
img.onclick=clickJon
document.addEventListener("keydown",function(e){
const key=e.key.toLowerCase()
handleSecretInput(key)
if(key in jonKeys){
jonKeys[key]=true
if(jonKeys.j&&jonKeys.o&&jonKeys.n){
e.preventDefault()
clickJon()
}
}
})
document.addEventListener("keyup",function(e){
const key=e.key.toLowerCase()
if(key in jonKeys){
jonKeys[key]=false
}
})
function clickJon(){
  const gain=perClick*clickMultiplier
  points+=gain
  showPointGain(gain)
  update()
}

function peekBulkCost(item,count,scale=1.2){
  let cost=item.cost
  let total=0
  for(let i=0;i<count;i++){
    total+=cost
    cost=Math.floor(cost*scale)
  }
  return total
}
function update(){
  rebuildMultipliers()
  points=Math.floor(points)
  document.getElementById("points").innerText=formatNumber(points)
  document.getElementById("perClick").innerText=formatNumber(perClick)
  document.getElementById("perSecond").innerText=formatNumber(perSecond)
  document.getElementById("souls").innerText=souls
  document.getElementById("rebirthCount").innerText=rebirthCount
  document.getElementById("superRebirthCount").innerText=superRebirthCount
  document.getElementById("clickMulti").innerText=clickMultiplier.toFixed(2)+"x"
  document.getElementById("autoMulti").innerText=autoMultiplier.toFixed(2)+"x"
document.getElementById("rebirthBtn").innerText=`Rebirth (${formatNumber(rebirthCost)} points)`
if(points>=10) document.getElementById("upgradePanel").style.display="block"
if(points>=25) document.getElementById("autoPanel").style.display="block"
if(souls>0) document.getElementById("soulPanel").style.display="block"
saveGame()
}
function renderShops(){
let uhtml="",ahtml="",shtml=""
upgrades.forEach((u,i)=>{
  const desc=upgradeTooltip(u)
  const bulk5=peekBulkCost(u,5)
  const bulk10=peekBulkCost(u,10)
  const label1=`${formatNumber(u.cost)} (1)`
  const label5=`${formatNumber(bulk5)} (5)`
  const label10=`${formatNumber(bulk10)} (10)`
  uhtml+=`<div class="item"><div class="item-text"><span>${themedName(u.name)} (${u.count})</span><span class="desc">${desc}</span></div><div class="bulk-grid"><button class="bulk-btn" title="${desc}" onclick="buyUpgrade(${i})">${label1}</button><button class="bulk-btn" title="Bulk 5 purchases" onclick="buyUpgradeBulk(${i},5)">${label5}</button><button class="bulk-btn" title="Bulk 10 purchases" onclick="buyUpgradeBulk(${i},10)">${label10}</button></div></div>`
})
autos.forEach((a,i)=>{
  const desc=autoTooltip(a)
  const bulk5=peekBulkCost(a,5,1.35)
  const bulk10=peekBulkCost(a,10,1.35)
  const label1=`${formatNumber(a.cost)} (1)`
  const label5=`${formatNumber(bulk5)} (5)`
  const label10=`${formatNumber(bulk10)} (10)`
  ahtml+=`<div class="item"><div class="item-text"><span>${themedName(a.name)} (${a.count})</span><span class="desc">${desc}</span></div><div class="bulk-grid"><button class="bulk-btn" title="${desc}" onclick="buyAuto(${i})">${label1}</button><button class="bulk-btn" title="Bulk 5 purchases" onclick="buyAutoBulk(${i},5)">${label5}</button><button class="bulk-btn" title="Bulk 10 purchases" onclick="buyAutoBulk(${i},10)">${label10}</button></div></div>`
})
soulUpgrades.forEach((s,i)=>{
  shtml+=`<div class="item"><div class="item-text"><span>${themedName(s.name)} (${s.count})</span><span class="desc">${themedText(s.description)}</span></div><button title="${themedText(s.description)}" onclick="buySoulUpgrade(${i})">${s.cost} Souls</button></div>`
})
document.getElementById("upgradeShop").innerHTML=uhtml
document.getElementById("autoShop").innerHTML=ahtml
document.getElementById("soulShop").innerHTML=shtml
}
function buyUpgrade(i){
  let u=upgrades[i]
  if(points>=u.cost){
    points-=u.cost
    u.count++
    perClick+=u.power
    u.cost=Math.floor(u.cost*1.2)
    spawnUpgradeJon()
    renderShops()
    update()
  }
}
function buyUpgradeBulk(i,count){
  let u=upgrades[i]
  let bought=0
  for(let k=0;k<count;k++){
    if(points<u.cost) break
    points-=u.cost
    u.count++
    perClick+=u.power
    u.cost=Math.floor(u.cost*1.2)
    bought++
  }
  if(bought>0){
    spawnUpgradeJon()
    renderShops()
    update()
  }
}
function buyAuto(i){
  let a=autos[i]
  if(points>=a.cost){
    points-=a.cost
    a.count++
    perSecond+=a.power
    a.cost=Math.floor(a.cost*1.35)
    spawnUpgradeJon()
    renderShops()
    update()
  }
}
function buyAutoBulk(i,count){
  let a=autos[i]
  let bought=0
  for(let k=0;k<count;k++){
    if(points<a.cost) break
    points-=a.cost
    a.count++
    perSecond+=a.power
    a.cost=Math.floor(a.cost*1.35)
    bought++
  }
  if(bought>0){
    spawnUpgradeJon()
    renderShops()
    update()
  }
}
function buySoulUpgrade(i){
  let s=soulUpgrades[i]
  if(souls>=s.cost){
    souls-=s.cost
    s.count++
    rebuildMultipliers()
    refreshSoulCost(s)
    spawnUpgradeJon()
    renderShops()
    update()
  }
}
setInterval(()=>{
points+=perSecond*autoMultiplier
update()
},1000)
function rebirth(){
  if(points>=rebirthCost){
    souls+=10
    rebirthCount++
    perClick=1
    perSecond=0
    points=0
    rebirthCost=Math.floor(rebirthCost*1.5)
    if(rebirthCost>=superRebirthThreshold){
      triggerSuperRebirth()
    }
    resetItems(upgrades, defaultUpgrades)
    resetItems(autos, defaultAutos)
    renderShops()
    update()
    alert(`Rebirth complete! Souls: ${souls}`)
  }
}

function triggerSuperRebirth(){
  superRebirthCount++
  souls+=superRebirthSoulReward
  superRebirthThreshold+=superRebirthCostIncrease
  rebirthCost=baseRebirthCost
  alert("Super Jon Rebirth achieved! +50 souls and the rebirth cost was reset.")
}
function spawnJonRain(){
  for(let i=0;i<12;i++){
    let j=document.createElement("img")
    j.src=heroImage
    j.className="rainJon"
    j.style.left=Math.random()*100+"vw"
    j.style.animationDuration=(3+Math.random()*2)+"s"
    j.style.opacity=(0.18+Math.random()*0.65).toFixed(2)
    j.style.transform=`scale(${0.8+Math.random()*0.4})`
    document.body.appendChild(j)
    setTimeout(()=>{j.remove()},6500)
  }
}

function scheduleRain(){
  if(!isRainActive) return
  const delay=1200+Math.random()*1300
  rainTimeoutId=setTimeout(()=>{
    spawnJonRain()
    scheduleRain()
  },delay)
}

function activateRain(){
  if(isRainActive) return
  isRainActive=true
  spawnJonRain()
  scheduleRain()
  updateRainButton()
}

function deactivateRain(){
  isRainActive=false
  clearTimeout(rainTimeoutId)
  rainTimeoutId=null
  updateRainButton()
}

function toggleRain(){
  if(isRainActive){
    deactivateRain()
  } else {
    activateRain()
  }
}
function spawnUpgradeJon(){
  const width=55, height=55
  const rect=img.getBoundingClientRect()
  const centerX=rect.width?rect.left+rect.width/2:window.innerWidth/2
  const centerY=rect.height?rect.top+rect.height/2:window.innerHeight/2
  const randomX=centerX+(Math.random()-0.5)*(rect.width||140)
  const randomY=centerY+(Math.random()-0.4)*(rect.height||140)
  const jonSprite=document.createElement("img")
  jonSprite.src=heroImage
  jonSprite.className="floatJon"
  const hue=Math.floor(Math.random()*360)
  jonSprite.style.filter=`hue-rotate(${hue}deg)`
  jonSprite.style.opacity="0.95"
  jonSprite.style.left=Math.min(Math.max(0,randomX),window.innerWidth-width)+"px"
  jonSprite.style.top=Math.min(Math.max(0,randomY),window.innerHeight-height)+"px"
  jonSprite.addEventListener("click",event=>{
    event.stopPropagation()
    clickJon()
    jonSprite.remove()
  })
  document.body.appendChild(jonSprite)
  setTimeout(()=>jonSprite.remove(),1500)
}
function refreshSoulCost(upgrade){
upgrade.cost=Math.max(upgrade.baseCost,Math.floor(upgrade.baseCost*Math.pow(1.7,upgrade.count)))
}
function saveGame(){
  localStorage.setItem("jonClickerSave",JSON.stringify({
    points,perClick,perSecond,souls,rebirthCost,rebirthCount,superRebirthCount,upgrades,autos,soulUpgrades
  }))
}
function loadSave(){
  const saved=localStorage.getItem("jonClickerSave")
  if(saved){
    const d=JSON.parse(saved)
    points=d.points
    perClick=d.perClick
    perSecond=d.perSecond
    souls=d.souls
    rebirthCost=d.rebirthCost||baseRebirthCost
    rebirthCount=d.rebirthCount ?? d.rebirths ?? estimateRebirthCountFromSoulsData(d)
    superRebirthCount=d.superRebirthCount ?? d.superRebirths ?? 0
    restoreItemsWithSavedState(upgrades, defaultUpgrades, d.upgrades)
    restoreItemsWithSavedState(autos, defaultAutos, d.autos)
    restoreItemsWithSavedState(soulUpgrades, defaultSoulUpgrades, d.soulUpgrades)
    renderShops()
    update()
  }
}
function exportSave(){
  const blob=new Blob([JSON.stringify({
    points,perClick,perSecond,souls,rebirthCost,rebirthCount,superRebirthCount,upgrades,autos,soulUpgrades
  })],{type:"application/json"})
const url=URL.createObjectURL(blob)
const a=document.createElement("a")
a.href=url
a.download="jonClickerSave.json"
a.click()
URL.revokeObjectURL(url)
}
function importSave(files){
  if(files.length===0) return
  const reader=new FileReader()
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result)
      points=d.points
      perClick=d.perClick
      perSecond=d.perSecond
      souls=d.souls
      rebirthCost=d.rebirthCost
      rebirthCount=d.rebirthCount ?? d.rebirths ?? estimateRebirthCountFromSoulsData(d)
      superRebirthCount=d.superRebirthCount ?? d.superRebirths ?? 0
      restoreItemsWithSavedState(upgrades, defaultUpgrades, d.upgrades)
      restoreItemsWithSavedState(autos, defaultAutos, d.autos)
      restoreItemsWithSavedState(soulUpgrades, defaultSoulUpgrades, d.soulUpgrades)
      renderShops()
      update()
      alert("Save Imported!")
    }catch{
      alert("Invalid save file")
    }
  }
  reader.readAsText(files[0])
}
loadSave()
renderShops()
update()
updateRainButton()
</script>
</body>
</html>
